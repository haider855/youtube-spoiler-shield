<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Spoiler Shield</title>
    <link rel="stylesheet" href="styles/popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <h1>YouTube Spoiler Shield</h1>
        <p class="status-text" id="status-text">Loading settings...</p>
      </header>

      <section class="protection-panel" aria-label="Protection status">
        <label class="toggle-control" for="protection-toggle">
          <span class="toggle-copy">
            <span class="toggle-title">Protection</span>
            <span class="toggle-state" id="toggle-state">On</span>
          </span>
          <input id="protection-toggle" type="checkbox">
          <span class="toggle-track" aria-hidden="true">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </section>

      <form class="keyword-form" id="keyword-form">
        <label for="keyword-input">Add spoiler keyword</label>
        <div class="input-row">
          <input
            id="keyword-input"
            type="text"
            maxlength="100"
            autocomplete="off"
            placeholder="Eren, Dune, UFC 302"
          >
          <button id="add-keyword-button" type="submit">Add</button>
        </div>
        <p class="feedback-text" id="feedback-text" role="status" aria-live="polite"></p>
      </form>

      <section class="keyword-section" aria-labelledby="keyword-heading">
        <h2 id="keyword-heading">Blocked keywords</h2>
        <p class="empty-state" id="empty-state">No keywords saved.</p>
        <ul class="keyword-list" id="keyword-list"></ul>
      </section>

      <p class="privacy-note">All rules are stored locally.</p>
    </main>
    <script src="dist/shared/constants.js" defer></script>
    <script src="dist/shared/storage.js" defer></script>
    <script src="dist/popup/popup.js" defer></script>
  </body>
</html>
