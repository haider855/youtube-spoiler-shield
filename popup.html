<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Spoiler Shield</title>
    <link rel="stylesheet" href="styles/popup.css">
  </head>
  <body>
    <main class="popup" aria-label="YouTube Spoiler Shield">
      <header class="popup-header">
        <div class="header-left">
          <div class="shield-icon" aria-hidden="true">
            <img src="src/assets/icons/icon32.png" width="32" height="32" alt="">
          </div>
          <div class="header-text">
            <h1 class="header-title">SPOILER SHIELD</h1>
            <p class="header-subtitle">YouTube Protection</p>
          </div>
        </div>

        <div class="toggle-wrap">
          <span class="toggle-label">Shield</span>
          <label class="toggle" for="protection-toggle">
            <span class="visually-hidden">Toggle spoiler protection</span>
            <input type="checkbox" id="protection-toggle">
            <span class="toggle-track" aria-hidden="true">
              <span class="toggle-thumb"></span>
            </span>
          </label>
        </div>
      </header>

      <section class="status-bar" id="status-bar" aria-live="polite">
        <span class="status-dot" id="status-dot" aria-hidden="true"></span>
        <p class="status-text" id="status-text">
          <strong id="status-strong">Loading</strong>
          <span id="status-detail"> - reading settings</span>
        </p>
      </section>

      <form class="section keyword-form" id="keyword-form">
        <label class="section-label" for="keyword-input">Add keyword</label>
        <select class="group-select" id="keyword-group-select" aria-label="Keyword group"></select>
        <div class="input-row">
          <input
            class="keyword-input"
            id="keyword-input"
            type="text"
            placeholder="e.g. Eren, Dune, UFC 302"
            maxlength="100"
            autocomplete="off"
            spellcheck="false"
          >
          <button class="add-btn" id="add-btn" type="submit">
            <svg class="button-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
            <span>Add</span>
          </button>
        </div>
        <p class="feedback-text" id="feedback-text" role="status" aria-live="polite"></p>
      </form>

      <div class="divider" aria-hidden="true"></div>

      <section class="groups-section" aria-labelledby="groups-heading">
        <div class="groups-header">
          <h2 class="section-label" id="groups-heading">Keyword groups</h2>
        </div>
        <div class="groups-list" id="groups-list"></div>
      </section>

      <div class="divider" aria-hidden="true"></div>

      <section class="keywords-section" aria-labelledby="keyword-heading">
        <div class="keywords-header">
          <h2 class="section-label" id="keyword-heading">Blocked keywords</h2>
          <span class="keywords-count" id="keywords-count">none</span>
        </div>
        <div class="keywords-list" id="keywords-list"></div>
      </section>

      <footer class="popup-footer">
        <svg class="footer-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 10V8C7 5.23858 9.23858 3 12 3C14.7614 3 17 5.23858 17 8V10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M6.5 10H17.5C18.3284 10 19 10.6716 19 11.5V19C19 19.8284 18.3284 20.5 17.5 20.5H6.5C5.67157 20.5 5 19.8284 5 19V11.5C5 10.6716 5.67157 10 6.5 10Z" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>All rules are stored locally - never leave your device</span>
      </footer>
    </main>

    <script src="dist/shared/constants.js" defer></script>
    <script src="dist/shared/storage.js" defer></script>
    <script src="dist/popup/popup.js" defer></script>
  </body>
</html>
